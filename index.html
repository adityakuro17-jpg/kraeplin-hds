<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Kraepelin - Hexa Daya Solusi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #ffffff; color: #1a1a18; overflow: hidden; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        
        #intro, #guide, #result { align-items: center; justify-content: center; padding: 2rem; text-align: center; overflow-y: auto; }
        .inner { max-width: 420px; width: 100%; }
        .logo-banner { width: 100%; max-width: 280px; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 12px; font-weight: 600; color: #9b9b96; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .input-field { width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        .btn-action { width: 100%; padding: 18px; background: #1a1a18; color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #2563eb; color: white; z-index: 100; }
        .timer-box { background: rgba(0,0,0,0.2); padding: 8px 18px; border-radius: 10px; font-family: 'DM Mono'; font-weight: 700; font-size: 18px; }

        /* KRAEPELIN VIEWPORT */
        .kraepelin-view { flex: 1; display: flex; justify-content: center; overflow: hidden; background: #ffffff; position: relative; }
        
        /* Container untuk scroll */
        .scroll-container { 
            display: flex; 
            flex-direction: column; 
            padding-top: 40vh; /* Memulai di tengah layar */
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 300px; 
        }

        /* BARIS DATA */
        .data-row { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100px; /* Tinggi baris tetap untuk kalkulasi scroll */
            position: relative;
            gap: 20px;
        }

        .soal-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
        }

        .soal-cell { 
            font-family: 'DM Mono', monospace; 
            font-size: 56px; 
            font-weight: 700; 
            line-height: 1;
        }

        /* AREA JAWABAN & SIMBOL */
        .ans-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 15px;
            width: 140px;
        }

        .plus-sign {
            font-size: 28px;
            font-weight: 600;
            color: #cbd5e1;
            user-select: none;
        }

        .ans-input { 
            width: 70px; 
            height: 70px; 
            border: 3px solid #e2e8f0; 
            border-radius: 16px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 38px; 
            font-weight: 700; 
            color: #2563eb;
            transition: all 0.2s;
        }

        .ans-input.active { border-color: #2563eb; background: #f0f7ff; box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); transform: scale(1.05); }
        .ans-input.filled { border-color: #1a1a18; background: #f8f8f6; color: #444; }

        /* KEYBOARD */
        .floating-keypad { background: #1a1a18; padding: 15px 10px 30px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; }
        .kbtn { background: #334155; border: none; height: 55px; border-radius: 12px; color: #fff; font-size: 22px; font-weight: 700; cursor: pointer; }
        .kbtn:active { background: #2563eb; }
    </style>
</head>
<body>

<div class="screen active" id="intro">
    <div class="inner">
        <img src="logo.png" class="logo-banner">
        <h1>Tes Kraepelin</h1>
        <p style="font-weight: 600; margin-bottom: 20px; color:#6b6b66">PT. Hexa Daya Solusi</p>
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="namaKandidat" class="input-field">
        </div>
        <div class="input-group">
            <label>Alamat Email</label>
            <input type="email" id="emailKandidat" class="input-field">
        </div>
        <button class="btn-action" onclick="toGuide()">Lanjut ke Panduan →</button>
    </div>
</div>

<div class="screen" id="guide">
    <div class="inner">
        <h1>Instruksi Tes</h1>
        <div style="text-align: left; background: #f8f8f6; padding: 20px; border-radius: 16px; margin: 20px 0; font-size: 15px; line-height: 1.5;">
            <p>• Jumlahkan angka <b>Atas</b> dengan angka <b>Bawah</b>.</p>
            <p>• Masukkan <b>Digit Satuan</b> (Contoh: 9+6=15, ketik 5).</p>
            <p>• Perhatikan simbol <b>+</b> di antara angka.</p>
        </div>
        <button class="btn-action" onclick="startTest()">Mulai Tes →</button>
    </div>
</div>

<div class="screen" id="test">
    <div class="test-header">
        <div>Segmen <span id="seg-val">1 / 40</span></div>
        <div class="timer-box" id="timer-display">00:30</div>
    </div>
    <div class="kraepelin-view">
        <div class="scroll-container" id="scroll-content"></div>
    </div>
    <div class="floating-keypad">
        <script>for(let i=1;i<=9;i++) document.write(`<button class="kbtn" onclick="handleInput(${i})">${i}</button>`);</script>
        <button class="kbtn" onclick="handleInput(0)">0</button>
    </div>
</div>

<div class="screen" id="result">
    <div class="inner">
        <h1>Tes Selesai</h1>
        <div style="background: #1a1a18; color: #fff; padding: 50px; border-radius: 28px; margin: 20px 0;">
            <div style="font-size: 12px; opacity: 0.6; margin-bottom: 10px;">TOTAL BENAR</div>
            <div style="font-size: 84px; font-weight: 700;" id="r-score">0</div>
            <p id="status-db" style="color: #4ade80; display: none; margin-top: 15px;">✓ Data Tersimpan</p>
        </div>
        <button class="btn-action" onclick="location.reload()">Selesai</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyiFQIx8INQlPZFNfOSoKJiTdG_3UEsTWy38Ps9z-2gamicU9d6TWQqzZJorDzj7Yyw/exec';
    let namaUser, emailUser, totalCorrect = 0, totalAns = 0;
    let curSeg = 1, timeLeft = 30, currentIdx = 0, pool = [];
    let segData = []; let segDikerjakan = 0, segBenar = 0;

    window.addEventListener('keydown', (e) => {
        if (document.getElementById('test').classList.contains('active')) {
            if (e.key >= '0' && e.key <= '9') handleInput(parseInt(e.key));
        }
    });

    function toGuide() {
        namaUser = document.getElementById('namaKandidat').value.trim();
        emailUser = document.getElementById('emailKandidat').value.trim();
        if (namaUser.length < 3 || !emailUser.includes('@')) return alert("Input tidak valid!");
        document.getElementById('intro').classList.remove('active');
        document.getElementById('guide').classList.add('active');
    }

    function startTest() {
        document.getElementById('guide').classList.remove('active');
        document.getElementById('test').classList.add('active');
        setupSegment();
        startTimer();
    }

    function setupSegment() {
        currentIdx = 0;
        segDikerjakan = 0;
        segBenar = 0;
        const container = document.getElementById('scroll-content');
        container.innerHTML = '';
        pool = [];
        for (let i = 0; i <= 70; i++) pool.push(Math.floor(Math.random() * 9) + 1);

        for (let i = 0; i < 65; i++) {
            const row = document.createElement('div');
            row.className = 'data-row';
            
            // Layout: Angka Kiri | Simbol + & Kotak Jawaban Kanan
            let actionHtml = '';
            if (i < 64) {
                actionHtml = `
                    <div class="ans-wrapper">
                        <span class="plus-sign">+</span>
                        <div class="ans-input" id="ans-${i}"></div>
                    </div>`;
            }

            row.innerHTML = `<div class="soal-column"><div class="soal-cell">${pool[i]}</div></div>${actionHtml}`;
            container.appendChild(row);
        }
        updateActiveUI();
    }

    function updateActiveUI() {
        document.querySelectorAll('.ans-input').forEach(b => b.classList.remove('active'));
        const activeBox = document.getElementById(`ans-${currentIdx}`);
        if (activeBox) {
            activeBox.classList.add('active');
            // Scroll mendarat tepat karena tinggi baris konsisten (100px)
            const offset = currentIdx * 100;
            document.getElementById('scroll-content').style.transform = `translateY(-${offset}px)`;
        }
    }

    function handleInput(n) {
        const correct = (pool[currentIdx] + pool[currentIdx + 1]) % 10;
        const isBenar = (n === correct);
        if (isBenar) { totalCorrect++; segBenar++; }
        totalAns++; segDikerjakan++;

        const box = document.getElementById(`ans-${currentIdx}`);
        box.textContent = n;
        box.classList.add('filled');

        currentIdx++;
        if (currentIdx < 64) updateActiveUI();
        else { saveSegment(); setupSegment(); }
    }

    function saveSegment() { segData.push({ dikerjakan: segDikerjakan, benar: segBenar }); }

    function startTimer() {
        const timer = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer-display').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
            } else {
                saveSegment();
                if (curSeg < 40) {
                    curSeg++; timeLeft = 30;
                    document.getElementById('seg-val').textContent = curSeg + " / 40";
                    setupSegment();
                } else { clearInterval(timer); endTest(); }
            }
        }, 1000);
    }

    function hitungAspek() {
        const n = segData.length || 1;
        const dikerjakanArr = segData.map(d => d.dikerjakan);
        const totalDikerjakan = dikerjakanArr.reduce((a, b) => a + b, 0);
        const avgDikerjakan = totalDikerjakan / n;
        const kecepatan = Math.min(100, Math.max(0, (avgDikerjakan - 10) / 40 * 100));
        const ketelitian = totalDikerjakan > 0 ? (totalCorrect / totalDikerjakan) * 100 : 0;
        const mean = avgDikerjakan;
        const sd = Math.sqrt(dikerjakanArr.reduce((a, b) => a + (b - mean) ** 2, 0) / n);
        const cv = mean > 0 ? (sd / mean) * 100 : 100;
        const keajegan = Math.max(0, 100 - cv);
        const half = Math.floor(n / 2);
        const avg1 = dikerjakanArr.slice(0, half).reduce((a, b) => a + b, 0) / (half || 1);
        const avg2 = dikerjakanArr.slice(half).reduce((a, b) => a + b, 0) / (n - half || 1);
        const drop = avg1 > 0 ? Math.max(0, (avg1 - avg2) / avg1) * 100 : 0;
        const ketahanan = Math.max(0, 100 - (drop * 2));

        return { kecepatan: Math.round(kecepatan), ketelitian: Math.round(ketelitian), keajegan: Math.round(keajegan), ketahanan: Math.round(ketahanan), totalDikerjakan };
    }

    function endTest() {
        document.getElementById('test').classList.remove('active');
        document.getElementById('result').classList.add('active');
        const hasil = hitungAspek();
        document.getElementById('r-score').textContent = totalCorrect;
        const payload = {
            nama: namaUser, email: emailUser, timestamp: new Date().toISOString(),
            total_benar: totalCorrect, total_dikerjakan: hasil.totalDikerjakan, akurasi: hasil.ketelitian + "%",
            kecepatan_score: hasil.kecepatan, ketelitian_score: hasil.ketelitian, keajegan_score: hasil.keajegan, ketahanan_score: hasil.ketahanan
        };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => { document.getElementById('status-db').style.display = 'block'; });
    }
</script>
</body>
</html>
