<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Kraepelin - Hexa Daya Solusi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #ffffff; color: #1a1a18; overflow: hidden; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        
        #intro, #guide, #result { align-items: center; justify-content: center; padding: 2rem; text-align: center; overflow-y: auto; }
        .inner { max-width: 400px; width: 100%; }
        .logo-banner { width: 100%; max-width: 250px; margin-bottom: 20px; }
        .btn-action { width: 100%; padding: 18px; background: #1a1a18; color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #2563eb; color: white; z-index: 100; font-weight: 600; }
        .timer-box { background: rgba(0,0,0,0.2); padding: 8px 18px; border-radius: 10px; font-family: 'DM Mono'; font-size: 18px; }

        /* VIEWPORT UTAMA */
        .kraepelin-view { flex: 1; display: flex; justify-content: center; overflow: hidden; background: #ffffff; }

        /* KONTINER SOAL CONTINUOUS */
        .scroll-container { 
            display: flex; 
            flex-direction: column; 
            padding-top: 40vh; /* Agar soal mulai dari tengah layar */
            transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
            width: 280px; 
        }

        /* BARIS SOAL: Berisi satu angka */
        .num-row {
            height: 60px; /* Jarak antar angka */
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 40px;
            font-family: 'DM Mono', monospace;
            font-size: 52px;
            font-weight: 700;
            color: #1a1a18;
            position: relative;
        }

        /* AREA JAWABAN: Ditempatkan ABSOLUTE di celah antara dua baris angka */
        .ans-zone {
            position: absolute;
            right: 20px;
            top: 30px; /* Menempatkan di tengah-tengah (60px / 2) */
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 5;
        }

        .plus-sign {
            font-size: 24px;
            font-weight: 600;
            color: #cbd5e1;
            user-select: none;
        }

        .ans-input { 
            width: 65px; 
            height: 65px; 
            border: 3px solid #e2e8f0; 
            border-radius: 16px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 36px; 
            font-weight: 700; 
            color: #2563eb;
            transition: 0.2s;
        }

        .ans-input.active { border-color: #2563eb; background: #f0f7ff; box-shadow: 0 0 15px rgba(37, 99, 235, 0.15); transform: scale(1.05); }
        .ans-input.filled { border-color: #1a1a18; background: #f8f8f6; color: #444; }

        /* KEYPAD */
        .floating-keypad { background: #1a1a18; padding: 15px 10px 30px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; }
        .kbtn { background: #334155; border: none; height: 55px; border-radius: 12px; color: #fff; font-size: 22px; font-weight: 700; cursor: pointer; }
        .kbtn:active { background: #2563eb; }
    </style>
</head>
<body>

<div class="screen active" id="intro">
    <div class="inner">
        <h1>Tes Kraepelin</h1>
        <p style="margin-bottom: 25px; color:#9b9b96;">PT. Hexa Daya Solusi</p>
        <input type="text" id="namaKandidat" class="input-field" style="margin-bottom:10px" placeholder="Nama Lengkap">
        <input type="email" id="emailKandidat" class="input-field" placeholder="Email">
        <button class="btn-action" onclick="toGuide()">Lanjut →</button>
    </div>
</div>

<div class="screen" id="guide">
    <div class="inner">
        <h2>Instruksi</h2>
        <p style="margin: 20px 0; font-size: 15px; color: #6b6b66;">Jumlahkan angka <b>Atas</b> dan <b>Bawah</b>. Masukkan digit satuannya pada kotak di antara kedua angka tersebut.</p>
        <button class="btn-action" onclick="startTest()">Mulai Tes</button>
    </div>
</div>

<div class="screen" id="test">
    <div class="test-header">
        <div>Segmen <span id="seg-val">1 / 40</span></div>
        <div class="timer-box" id="timer-display">00:30</div>
    </div>
    <div class="kraepelin-view">
        <div class="scroll-container" id="scroll-content"></div>
    </div>
    <div class="floating-keypad">
        <script>for(let i=1;i<=9;i++) document.write(`<button class="kbtn" onclick="handleInput(${i})">${i}</button>`);</script>
        <button class="kbtn" onclick="handleInput(0)">0</button>
    </div>
</div>

<div class="screen" id="result">
    <div class="inner">
        <h1>Selesai</h1>
        <div style="background: #1a1a18; color: #fff; padding: 40px; border-radius: 20px; margin: 20px 0;">
            <div style="font-size: 80px; font-weight: 700;" id="r-score">0</div>
            <p>Jawaban Benar</p>
        </div>
        <button class="btn-action" onclick="location.reload()">Keluar</button>
    </div>
</div>

<script>
    const scriptURL = 'URL_WEB_APP_ANDA';
    let namaUser, emailUser, totalCorrect = 0, totalAns = 0;
    let curSeg = 1, timeLeft = 30, currentIdx = 0, pool = [];
    let segData = []; let segDikerjakan = 0, segBenar = 0;

    window.addEventListener('keydown', (e) => {
        if (document.getElementById('test').classList.contains('active') && e.key >= '0' && e.key <= '9') {
            handleInput(parseInt(e.key));
        }
    });

    function toGuide() {
        namaUser = document.getElementById('namaKandidat').value;
        emailUser = document.getElementById('emailKandidat').value;
        if (!namaUser || !emailUser) return alert("Isi data!");
        document.getElementById('intro').classList.remove('active');
        document.getElementById('guide').classList.add('active');
    }

    function startTest() {
        document.getElementById('guide').classList.remove('active');
        document.getElementById('test').classList.add('active');
        setupSegment();
        startTimer();
    }

    function setupSegment() {
        currentIdx = 0;
        segDikerjakan = 0;
        segBenar = 0;
        const container = document.getElementById('scroll-content');
        container.innerHTML = '';
        pool = [];
        // Generate angka soal
        for (let i = 0; i <= 80; i++) pool.push(Math.floor(Math.random() * 9) + 1);

        for (let i = 0; i < pool.length; i++) {
            const row = document.createElement('div');
            row.className = 'num-row';
            row.innerHTML = pool[i];
            
            // Masukkan kotak jawaban di ANTARA baris i dan i+1
            if (i < pool.length - 1) {
                const ansZone = document.createElement('div');
                ansZone.className = 'ans-zone';
                ansZone.innerHTML = `<span class="plus-sign">+</span><div class="ans-input" id="ans-${i}"></div>`;
                row.appendChild(ansZone);
            }
            container.appendChild(row);
        }
        updateActiveUI();
    }

    function updateActiveUI() {
        document.querySelectorAll('.ans-input').forEach(b => b.classList.remove('active'));
        const activeBox = document.getElementById(`ans-${currentIdx}`);
        if (activeBox) {
            activeBox.classList.add('active');
            // Tinggi baris dikunci 60px. Scroll dihitung per angka.
            const offset = currentIdx * 60; 
            document.getElementById('scroll-content').style.transform = `translateY(-${offset}px)`;
        }
    }

    function handleInput(n) {
        const correct = (pool[currentIdx] + pool[currentIdx + 1]) % 10;
        if (n === correct) { totalCorrect++; segBenar++; }
        totalAns++; segDikerjakan++;

        const box = document.getElementById(`ans-${currentIdx}`);
        if (box) {
            box.textContent = n;
            box.classList.add('filled');
            currentIdx++;
            if (currentIdx < pool.length - 1) updateActiveUI();
            else setupSegment();
        }
    }

    function saveSegment() { segData.push({ dikerjakan: segDikerjakan, benar: segBenar }); }

    function startTimer() {
        const timer = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer-display').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
            } else {
                saveSegment();
                if (curSeg < 40) {
                    curSeg++; timeLeft = 30;
                    document.getElementById('seg-val').textContent = curSeg + " / 40";
                    setupSegment();
                } else { clearInterval(timer); endTest(); }
            }
        }, 1000);
    }

    function endTest() {
        document.getElementById('test').classList.remove('active');
        document.getElementById('result').classList.add('active');
        document.getElementById('r-score').textContent = totalCorrect;
        // Kirim data ke spreadsheet (sesuaikan payloadnya)
    }
</script>
</body>
</html>
