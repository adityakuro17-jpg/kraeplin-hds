<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Kraepelin - Hexa Daya Solusi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #f8f8f6; color: #1a1a18; overflow: hidden; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        
        /* Intro & Guide */
        #intro, #guide { align-items: center; justify-content: center; padding: 2rem 1.5rem; overflow-y: auto; }
        .inner-container { max-width: 420px; width: 100%; text-align: center; }
        .logo-banner { width: 100%; max-width: 300px; height: auto; display: block; margin: 0 auto 2rem; }
        .input-field { width: 100%; padding: 14px; border: 1px solid #e8e8e4; border-radius: 12px; font-size: 16px; margin-bottom: 1rem; outline: none; }
        .btn-action { width: 100%; padding: 16px; background: #1a1a18; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; }

        /* KRAEPELIN VERTICAL UI */
        #test { background: #ffffff; }
        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #2563eb; color: white; z-index: 10; }
        
        .kraepelin-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            background: #f0f2f5;
        }

        /* Kolom Angka Vertikal */
        .number-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            transition: transform 0.3s ease;
        }

        .number-pair {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            font-size: 32px;
            color: #333;
        }

        .ans-box {
            width: 50px;
            height: 50px;
            border: 3px solid #ddd;
            border-radius: 8px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #2563eb;
            font-size: 28px;
            transition: all 0.2s;
        }

        .ans-box.active {
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
            background: #eef2ff;
            transform: scale(1.1);
        }

        .ans-box.filled {
            border-color: #1a1a18;
            background: #f8f8f6;
            color: #555;
        }

        /* Keypad Tetap di Bawah */
        .keypad-wrap { background: #1a1a18; padding: 20px 20px 30px; border-radius: 24px 24px 0 0; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 400px; margin: 0 auto; }
        .kbtn { background: #333; border: none; height: 60px; border-radius: 12px; color: #fff; font-size: 24px; font-weight: 600; cursor: pointer; }
        .kbtn:active { background: #555; }

        /* Result */
        #result { padding: 2rem; align-items: center; justify-content: center; text-align: center; }
        .score-hero { background: #1a1a18; color: #fff; padding: 40px; border-radius: 24px; margin: 20px 0; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="screen active" id="intro">
    <div class="inner-container">
        <img src="logo.png" alt="Logo" class="logo-banner">
        <h1>Registrasi</h1>
        <input type="text" id="namaKandidat" class="input-field" placeholder="Nama Lengkap">
        <input type="email" id="emailKandidat" class="input-field" placeholder="Email Aktif">
        <button class="btn-action" onclick="showGuide()">Lanjut →</button>
    </div>
</div>

<div class="screen" id="guide">
    <div class="inner-container">
        <h1>Instruksi Vertikal</h1>
        <div style="text-align: left; margin: 20px 0; font-size: 14px;">
            <p>1. Jumlahkan angka atas dan bawah.</p>
            <p>2. Ketik angka satuan (digit terakhir).</p>
            <p>3. Kotak biru adalah posisi Anda sekarang.</p>
            <p>4. Ada 40 segmen, masing-masing 30 detik.</p>
        </div>
        <button class="btn-action" onclick="startTest()">Mulai Tes →</button>
    </div>
</div>

<div class="screen" id="test">
    <div class="test-header">
        <div>Segmen <span id="seg-val">1 / 40</span></div>
        <div class="timer-box" id="timer-display">00:30</div>
    </div>
    
    <div class="kraepelin-container" id="container">
        <div class="number-column" id="column">
            </div>
    </div>

    <div class="keypad-wrap">
        <div class="keypad">
            <script>for(let i=1;i<=9;i++) document.write(`<button class="kbtn" onclick="handleInput(${i})">${i}</button>`);</script>
            <button class="kbtn" style="grid-column: 2;" onclick="handleInput(0)">0</button>
        </div>
    </div>
</div>

<div class="screen" id="result">
    <div class="result-inner">
        <h1>Hasil Tes</h1>
        <div class="score-hero">
            <div style="font-size: 12px; opacity: 0.6;">TOTAL BENAR</div>
            <div style="font-size: 72px;" id="r-score">0</div>
            <p id="status-db" style="color: #4ade80; display: none; margin-top: 10px;">✓ Data Berhasil Tersimpan</p>
        </div>
        <button class="btn-action" onclick="location.reload()">Selesai</button>
    </div>
</div>

<script>
    let namaUser, emailUser, totalCorrect = 0, totalAns = 0;
    let curSeg = 1, timeLeft = 30;
    let timerInterval;
    let currentIdx = 0;
    const TOTAL_ROWS = 50; // Jumlah baris per segmen
    
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyiFQIx8INQlPZFNfOSoKJiTdG_3UEsTWy38Ps9z-2gamicU9d6TWQqzZJorDzj7Yyw/exec';

    function showGuide() {
        namaUser = document.getElementById('namaKandidat').value.trim();
        emailUser = document.getElementById('emailKandidat').value.trim();
        if (namaUser.length < 3 || !emailUser.includes('@')) return alert("Isi data dengan benar!");
        document.getElementById('intro').classList.remove('active');
        document.getElementById('guide').classList.add('active');
    }

    function startTest() {
        document.getElementById('guide').classList.remove('active');
        document.getElementById('test').classList.add('active');
        setupSegment();
        startTimer();
    }

    function setupSegment() {
        currentIdx = 0;
        const column = document.getElementById('column');
        column.innerHTML = '';
        column.style.transform = `translateY(0px)`;
        
        // Generate angka pertama (paling atas)
        let topNum = Math.floor(Math.random() * 9) + 1;
        
        for (let i = 0; i < TOTAL_ROWS; i++) {
            let botNum = Math.floor(Math.random() * 9) + 1;
            let correct = (topNum + botNum) % 10;

            const div = document.createElement('div');
            div.className = 'number-pair';
            div.innerHTML = `
                <div>${topNum}</div>
                <div class="ans-box" id="ans-${i}"></div>
                <div>${botNum}</div>
            `;
            div.dataset.correct = correct;
            column.appendChild(div);
            
            topNum = botNum; // Angka bawah menjadi angka atas di baris berikutnya
        }
        updateActiveBox();
    }

    function updateActiveBox() {
        document.querySelectorAll('.ans-box').forEach(b => b.classList.remove('active'));
        const activeBox = document.getElementById(`ans-${currentIdx}`);
        if (activeBox) {
            activeBox.classList.add('active');
            // Scroll otomatis agar kotak aktif selalu di tengah
            const containerHeight = document.getElementById('container').offsetHeight;
            const offset = (currentIdx * 120) - (containerHeight / 2) + 60;
            document.getElementById('column').style.transform = `translateY(-${offset > 0 ? offset : 0}px)`;
        }
    }

    function handleInput(n) {
        const pairs = document.querySelectorAll('.number-pair');
        if (currentIdx >= pairs.length) return;

        const correctAns = parseInt(pairs[currentIdx].dataset.correct);
        const box = document.getElementById(`ans-${currentIdx}`);

        totalAns++;
        if (n === correctAns) {
            totalCorrect++;
            box.textContent = n;
        } else {
            box.textContent = n;
            box.style.color = 'red';
        }

        box.classList.add('filled');
        currentIdx++;
        
        if (currentIdx < TOTAL_ROWS) {
            updateActiveBox();
        } else {
            // Jika baris habis sebelum waktu selesai, generate lagi/segmen baru
            setupSegment();
        }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-display').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                if (curSeg < 40) {
                    curSeg++;
                    timeLeft = 30;
                    document.getElementById('seg-val').textContent = curSeg + " / 40";
                    setupSegment();
                } else {
                    endTest();
                }
            }
        }, 1000);
    }

    function endTest() {
        clearInterval(timerInterval);
        document.getElementById('test').classList.remove('active');
        document.getElementById('result').classList.add('active');
        document.getElementById('r-score').textContent = totalCorrect;
        const acc = Math.round((totalCorrect / totalAns) * 100);
        
        fetch(scriptURL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ nama: namaUser, email: emailUser, skor: totalCorrect, akurasi: acc + "%" })
        }).then(() => {
            document.getElementById('status-db').style.display = 'block';
        });
    }
</script>
</body>
</html>
