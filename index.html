<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUMMY TEST - Kraepelin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #f8f8f6; color: #1a1a18; overflow: hidden; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        #intro { align-items: center; justify-content: center; padding: 2rem 1.5rem; }
        .intro-inner { max-width: 420px; width: 100%; }
        .logo-mark { width: 48px; height: 48px; background: #ff4757; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 2rem; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 0.5rem; }
        .subtitle { font-size: 15px; color: #6b6b66; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: #9b9b96; text-transform: uppercase; margin-bottom: 8px; }
        .input-field { width: 100%; padding: 14px; border: 1px solid #e8e8e4; border-radius: 12px; font-size: 16px; outline: none; font-family: inherit; }
        .btn-start { width: 100%; padding: 16px; background: #1a1a18; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; }
        #test { background: #2563eb; color: #fff; }
        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
        .timer-box { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 10px; font-family: 'DM Mono'; font-weight: 600; }
        .number-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .num-display { font-size: 90px; font-weight: 600; font-family: 'DM Mono'; display: flex; align-items: center; gap: 20px; }
        .keypad-wrap { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px 20px 40px; border-radius: 24px 24px 0 0; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 400px; margin: 0 auto; }
        .kbtn { background: rgba(255,255,255,0.2); border: none; height: 65px; border-radius: 16px; color: #fff; font-size: 24px; cursor: pointer; }
        #result { padding: 2rem; align-items: center; justify-content: center; }
        .score-hero { background: #1a1a18; color: #fff; padding: 40px 20px; border-radius: 24px; margin: 20px 0; text-align: center; width: 100%; max-width: 400px; }
        .status-db { font-size: 13px; color: #4ade80; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="screen active" id="intro">
    <div class="intro-inner">
        <div class="logo-mark"><strong style="color:white">TEST</strong></div>
        <h1>Mode Dummy</h1>
        <p class="subtitle">Waktu: 5 Detik / Segmen | Total: 3 Segmen</p>
        <div class="input-group"><label>Nama</label><input type="text" id="namaKandidat" class="input-field" placeholder="Nama..." autocomplete="off"></div>
        <div class="input-group"><label>Email</label><input type="email" id="emailKandidat" class="input-field" placeholder="Email..." autocomplete="off"></div>
        <button class="btn-start" onclick="validasiStart()">Mulai Tes Cepat →</button>
    </div>
</div>

<div class="screen" id="test">
    <div class="test-header">
        <div>Segmen <span id="seg-val">1 / 3</span></div>
        <div class="timer-box" id="timer-display">00:05</div>
    </div>
    <div class="number-area">
        <div class="num-display"><span id="num-top">5</span><span>+</span><span id="num-bot">3</span></div>
    </div>
    <div class="keypad-wrap">
        <div class="keypad">
            <script>for(let i=0;i<=9;i++) document.write(`<button class="kbtn" onclick="handleInput(${i})">${i}</button>`);</script>
        </div>
    </div>
</div>

<div class="screen" id="result">
    <div class="result-inner" style="text-align:center">
        <h1>Selesai!</h1>
        <div class="score-hero">
            <div style="font-size: 12px; color: #9b9b96;">SKOR TOTAL</div>
            <div style="font-size: 72px; font-family: 'DM Mono';" id="r-score">0</div>
            <div id="status-db" class="status-db">✓ Terkirim ke Google Sheets!</div>
        </div>
        <button class="btn-start" onclick="location.reload()">Ulangi</button>
    </div>
</div>

<script>
    let namaUser, emailUser, totalCorrect = 0, totalAns = 0;
    let curSeg = 1, timeLeft = 5; // SETTING DUMMY: 5 DETIK
    let timerInterval;
    
    // GUNAKAN URL WEB APP MILIK ANDA SENDIRI DI SINI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyiFQIx8INQlPZFNfOSoKJiTdG_3UEsTWy38Ps9z-2gamicU9d6TWQqzZJorDzj7Yyw/exec';

    function validasiStart() {
        namaUser = document.getElementById('namaKandidat').value.trim();
        emailUser = document.getElementById('emailKandidat').value.trim();
        if (!namaUser || !emailUser) { alert("Isi data dulu!"); return; }
        document.getElementById('intro').classList.remove('active');
        document.getElementById('test').classList.add('active');
        generateNumbers();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-display').textContent = `00:0${timeLeft}`;
            if (timeLeft <= 0) {
                if (curSeg < 3) { // SETTING DUMMY: 3 SEGMEN
                    curSeg++;
                    timeLeft = 5;
                    document.getElementById('seg-val').textContent = curSeg + " / 3";
                    generateNumbers();
                } else {
                    endTest();
                }
            }
        }, 1000);
    }

    function generateNumbers() {
        document.getElementById('num-top').textContent = Math.floor(Math.random() * 9) + 1;
        document.getElementById('num-bot').textContent = Math.floor(Math.random() * 9) + 1;
    }

    function handleInput(n) {
        const n1 = parseInt(document.getElementById('num-top').textContent);
        const n2 = parseInt(document.getElementById('num-bot').textContent);
        if (n === (n1 + n2) % 10) totalCorrect++;
        totalAns++;
        generateNumbers();
    }

    function endTest() {
        clearInterval(timerInterval);
        document.getElementById('test').classList.remove('active');
        document.getElementById('result').classList.add('active');
        document.getElementById('r-score').textContent = totalCorrect;
        
        const acc = totalAns > 0 ? Math.round((totalCorrect / totalAns) * 100) : 0;
        
        fetch(scriptURL, {
            method: 'POST', mode: 'no-cors', cache: 'no-cache',
            body: JSON.stringify({ nama: namaUser, email: emailUser, skor: totalCorrect, akurasi: acc + "%", konsistensi: "Dummy-Test" })
        }).then(() => {
            document.getElementById('status-db').style.display = 'block';
        });
    }
</script>
</body>
</html>
