<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Kraepelin - Hexa Daya Solusi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #ffffff; color: #1a1a18; overflow: hidden; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        
        /* Header */
        .test-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #2563eb; color: white; z-index: 100; }
        .timer-box { background: rgba(0,0,0,0.2); padding: 8px 18px; border-radius: 10px; font-family: 'DM Mono'; font-weight: 700; font-size: 18px; }

        /* KRAEPELIN ENGINE */
        .kraepelin-view {
            flex: 1;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .scroll-container {
            display: flex;
            flex-direction: column;
            padding-top: 250px; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
        }

        /* Row Layout */
        .data-row {
            display: flex;
            align-items: flex-start; /* Biar angka stay di atas */
            justify-content: space-between;
            height: 120px; /* Tinggi baris */
            position: relative;
        }

        .soal-cell {
            font-family: 'DM Mono', monospace;
            font-size: 64px;
            font-weight: 700;
            width: 80px;
            text-align: center;
        }

        /* Kotak Jawab Sejajar Sela Angka */
        .ans-wrapper {
            width: 100px;
            position: relative;
        }

        .ans-input {
            position: absolute;
            top: 60px; /* SETENGAH DARI HEIGHT 120px = PAS DI SELA-SELA */
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            color: #2563eb;
            z-index: 10;
        }

        .ans-input.active {
            border-color: #2563eb;
            background: #f0f7ff;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        .ans-input.filled {
            border-color: #1a1a18;
            background: #f8f8f6;
            color: #444;
        }

        /* KEYBOARD */
        .floating-keypad {
            background: #1a1a18;
            padding: 15px 10px 30px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            z-index: 100;
        }
        .kbtn { background: #334155; border: none; height: 65px; border-radius: 12px; color: #fff; font-size: 24px; font-weight: 700; }
        .kbtn:active { background: #2563eb; }

        /* Intro & Result */
        #intro, #guide, #result { align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .inner { max-width: 450px; width: 100%; }
        .btn-action { width: 100%; padding: 18px; background: #1a1a18; color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="screen active" id="intro">
    <div class="inner">
        <img src="logo.png" style="width: 100%; max-width: 280px; margin-bottom: 20px;">
        <h1>Tes Kraepelin</h1>
        <p style="font-weight: 600; margin-bottom: 20px;">PT. Hexa Daya Solusi</p>
        <button class="btn-action" onclick="startFlow()">Mulai Tes →</button>
    </div>
</div>

<div class="screen" id="test">
    <div class="test-header">
        <div>Segmen <span id="seg-val">1 / 40</span></div>
        <div class="timer-box" id="timer-display">00:30</div>
    </div>
    <div class="kraepelin-view">
        <div class="scroll-container" id="scroll-content"></div>
    </div>
    <div class="floating-keypad">
        <script>for(let i=1;i<=9;i++) document.write(`<button class="kbtn" onclick="handleInput(${i})">${i}</button>`);</script>
        <button class="kbtn" onclick="handleInput(0)">0</button>
    </div>
</div>

<div class="screen" id="result">
    <div class="inner">
        <h1>Selesai</h1>
        <div style="background: #1a1a18; color: #fff; padding: 50px; border-radius: 24px; margin: 20px 0;">
            <div style="font-size: 84px; font-weight: 700;" id="r-score">0</div>
        </div>
        <button class="btn-action" onclick="location.reload()">Ulangi</button>
    </div>
</div>

<script>
    let totalCorrect = 0, curSeg = 1, timeLeft = 30, currentIdx = 0, pool = [];

    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') handleInput(parseInt(e.key));
    });

    function startFlow() {
        document.getElementById('intro').classList.remove('active');
        document.getElementById('test').classList.add('active');
        setupSegment();
        startTimer();
    }

    function setupSegment() {
        currentIdx = 0;
        const container = document.getElementById('scroll-content');
        container.innerHTML = '';
        
        pool = [];
        for(let i=0; i <= 60; i++) pool.push(Math.floor(Math.random() * 9) + 1);

        for (let i = 0; i < 60; i++) {
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `
                <div class="soal-cell">${pool[i]}</div>
                <div class="ans-wrapper">
                    ${i < 59 ? `<div class="ans-input" id="ans-${i}"></div>` : ''}
                </div>
            `;
            container.appendChild(row);
        }
        updateActiveUI();
    }

    function updateActiveUI() {
        document.querySelectorAll('.ans-input').forEach(b => b.classList.remove('active'));
        const activeBox = document.getElementById(`ans-${currentIdx}`);
        if (activeBox) {
            activeBox.classList.add('active');
            const offset = (currentIdx * 120);
            document.getElementById('scroll-content').style.transform = `translateY(-${offset}px)`;
        }
    }

    function handleInput(n) {
        if (!document.getElementById('test').classList.contains('active')) return;
        const correct = (pool[currentIdx] + pool[currentIdx+1]) % 10;
        if (n === correct) totalCorrect++;
        
        const box = document.getElementById(`ans-${currentIdx}`);
        box.textContent = n;
        box.classList.add('filled');
        
        currentIdx++;
        if (currentIdx < 59) updateActiveUI();
        else setupSegment();
    }

    function startTimer() {
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer-display').textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
            } else {
                if (curSeg < 40) {
                    curSeg++; timeLeft = 30;
                    document.getElementById('seg-val').textContent = curSeg + " / 40";
                    setupSegment();
                } else {
                    document.getElementById('test').classList.remove('active');
                    document.getElementById('result').classList.add('active');
                    document.getElementById('r-score').textContent = totalCorrect;
                }
            }
        }, 1000);
    }
</script>
</body>
</html>
